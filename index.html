<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GradeMe</title>

    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="css/home.css">
    <link rel="stylesheet" href="css/grades.css">
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <meta name="theme-color" content="#141414">
    <script src="https://code.iconify.design/iconify-icon/3.0.0/iconify-icon.min.js"></script>
</head>
<body>
    <main>
        <div class="home" id="home">
            <header class="screen-header">
                <h1>Welcome back.</h1>
            </header>

            <section class="gpa">
                <h2>Current GPA</h2>
                <p>4.4</p>
            </section>
        </div>

        <div class="grades" id="grades">
            <header class="screen-header">
                <h1>Grades</h1>
            </header>

            <section class="gpa">
                <h2>Current GPA</h2>
                <p>4.4</p>
            </section>

            <section class="subject-grades">
                <div class="subject-container" id="subject-container"></div>
                <button class="btn-1" onclick="openAddSubject()">Add subject</button>
            </section>
        </div>
    </main>

    <nav>
        <button onclick="goHome()" class="nav-btn"><iconify-icon icon="material-symbols:home-outline-rounded"></iconify-icon><span>Home</span></button>
        <button onclick="goGrades()" class="nav-btn"><iconify-icon icon="material-symbols:list-rounded"></iconify-icon><span>Grades</span></button>
        <div class="add-btn">+</div>
        <button onclick="goTimetable()" class="nav-btn"><iconify-icon icon="material-symbols:table-outline"></iconify-icon><span>Timetable</span></button>
        <button onclick="goEvents()" class="nav-btn"><iconify-icon icon="material-symbols:event-outline"></iconify-icon><span>Events</span></button>
    </nav>

    <div class="add-subject-screen" id="add-subject-screen">
        <div class="add-subject-content">
            <h2>Add subject</h2>
            <input id="add-subject-input" type="text" placeholder="Subject name">
            <button onclick="addSubject()">Add</button>
            <button onclick="closeAddSubject()">Cancel</button>
        </div>
    </div>

    <div class="subject-menu-screen" id="subject-menu-screen">
        <div class="subject-menu-container">
            <h2 id="subject-menu-h2">67</h2>
            <ul id="subject-menu-grades">23 <br> 23</ul>
            <button onclick="removeSubject()">Remove subject</button>
        </div>
    </div>
    <script src="js/storage.js"></script>
    <script src="app.js"></script>
</body>
</html>
