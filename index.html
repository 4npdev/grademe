<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GradeMe</title>

    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="css/home.css">
    <link rel="stylesheet" href="css/grades.css">
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <meta name="theme-color" content="#141414">
    <script src="https://code.iconify.design/iconify-icon/3.0.0/iconify-icon.min.js"></script>
</head>
<body>
    <main>
        <div class="home">
            <header class="screen-header">
                <h1>Welcome back.</h1>
            </header>

            <section class="gpa">
                <h2>Current GPA</h2>
                <p>4.4</p>
            </section>
        </div>

        <div class="grades">
            <header class="screen-header">
                <h1>Grades</h1>
            </header>

            <section class="gpa">
                <h2>Current GPA</h2>
                <p>4.4</p>
            </section>

            <section class="subject-grades">
                    <div class="subject-container">
                        <div class="subject">
                        <div class="subject-left">
                            <h2>Matematika</h2>
                            <p>5, 1, 2, 2</p>
                        </div>

                        <div class="subject-right">
                            <p>2.5</p>
                        </div>
                    </div>
                    <div class="subject">
                        <div class="subject-left">
                            <h2>Srpski</h2>
                            <p>No grades yet.</p>
                        </div>

                        <div class="subject-right">
                            <p></p>
                        </div>
                    </div>
                    <div class="subject" style="background: var(--failing-grade);">
                        <div class="subject-left">
                            <h2>Web</h2>
                            <p>1, 1, 2</p>
                        </div>

                        <div class="subject-right">
                            <p>1.3</p>
                        </div>
                    </div>
                </div>
                <button class="btn-1">Add subject</button>
            </section>
        </div>
    </main>

    <nav>
        <button class="nav-btn"><iconify-icon icon="material-symbols:home-outline-rounded"></iconify-icon><span>Home</span></button>
        <button class="nav-btn"><iconify-icon icon="material-symbols:list-rounded"></iconify-icon><span>Grades</span></button>
        <div class="add-btn">+</div>
        <button class="nav-btn"><iconify-icon icon="material-symbols:table-outline"></iconify-icon><span>Timetable</span></button>
        <button class="nav-btn"><iconify-icon icon="material-symbols:event-outline"></iconify-icon><span>Events</span></button>
    </nav>
    <script src="js/storage.js"></script>
    <script src="app.js"></script>
</body>
</html>
